<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download the App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f7;
      text-align: center;
    }
    .container {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 0.5rem;
      color: #1d1d1f;
    }
    p {
      color: #6e6e73;
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    .appstore-button {
      display: inline-block;
      background-color: #0071e3;
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 1.1rem;
      transition: background-color 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,113,227,0.2);
    }
    .appstore-button:hover {
      background-color: #0077ed;
    }
    .appstore-button:active {
      background-color: #0063c4;
    }
    .note {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #86868b;
    }
    .local-badge {
      background: #f0f0f0;
      color: #666;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 Download the App</h1>
    <p>It looks like you don't have the app installed.<br>Get it from the App Store to continue.</p>
    <a class="appstore-button" href="https://apps.apple.com/hk/app/id-one/id6755210949" target="_blank" rel="noopener noreferrer">
      ⬇️ Download on the App Store
    </a>
    <div class="note">ID-ONE App · Hong Kong</div>
    <div id="localIndicator" class="local-badge"></div>
  </div>

  <script>
    (function() {
      var appStoreLink = 'https://apps.apple.com/hk/app/id-one/id6755210949';
      var productionUniversalLinkDomain = 'https://webekyc-uat.tradelinksig.com';
      
      var isLocalhost = window.location.hostname === 'localhost' 
                     || window.location.hostname === '127.0.0.1'
                     || window.location.hostname.startsWith('192.168.');
      
      // 显示本地测试标记（可选）
      if (isLocalhost) {
        document.getElementById('localIndicator').innerText = '🧪 本地测试模式 - 自动唤起已禁用';
        console.log('🧪 本地测试模式：跳过自动唤起 App');
        return; // 本地不执行唤起逻辑
      }
      
      // 线上环境：构建完整 Universal Link
      var appUniversalLink = productionUniversalLinkDomain + window.location.pathname + window.location.search;
      
      // 尝试唤起 App
      window.location.href = appUniversalLink;
      
      var timer = setTimeout(function() {
        window.location.href = appStoreLink;
      }, 500);
      
      window.addEventListener('blur', function() {
        clearTimeout(timer);
      });
    })();
  </script>
</body>
</html>
