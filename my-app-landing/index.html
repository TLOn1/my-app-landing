<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download the App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f7;
      text-align: center;
    }
    .container {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 0.5rem;
      color: #1d1d1f;
    }
    p {
      color: #6e6e73;
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    .appstore-button {
      display: inline-block;
      background-color: #0071e3;
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 1.1rem;
      transition: background-color 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,113,227,0.2);
    }
    .appstore-button:hover {
      background-color: #0077ed;
    }
    .appstore-button:active {
      background-color: #0063c4;
    }
    .note {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #86868b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 Download the App</h1>
    <p>It looks like you don't have the app installed.<br>Get it from the App Store to continue.</p>
    <a class="appstore-button" href="https://apps.apple.com/hk/app/id-one/id6755210949" target="_blank" rel="noopener noreferrer">
      ⬇️ Download on the App Store
    </a>
    <div class="note">ID-ONE App · Hong Kong</div>
  </div>

  <script>
  (function() {
    var appStoreLink = 'https://apps.apple.com/hk/app/id-one/id6755210949';
    var customDomain = 'webekyc-uat.tradelinksig.com';
    
    var host = window.location.hostname;
    var isLocal = host === 'localhost' || host === '127.0.0.1';
    var isVercel = host.endsWith('.vercel.app');
    var isCustom = host === customDomain;
    
    // 本地开发：只显示页面，不自动跳转
    if (isLocal) {
      console.log('🧪 本地环境，无自动跳转');
      return;
    }
    
    // Vercel 预览域名：直接跳转 App Store（不尝试唤起 App，避免循环）
    if (isVercel) {
      console.log('🚀 Vercel 预览域名，直接跳转 App Store');
      window.location.href = appStoreLink;
      return;
    }
    
    // 正式自定义域名：尝试唤起 App，失败后跳转 App Store
    if (isCustom) {
      var appUniversalLink = window.location.href;
      window.location.href = appUniversalLink;
      
      var fallbackTimer = setTimeout(function() {
        window.location.href = appStoreLink;
      }, 500);
      
      window.addEventListener('blur', function() {
        clearTimeout(fallbackTimer);
      });
      return;
    }
    
    // 其他未知域名：仅显示页面，不做自动操作
    console.log('⚠️ 未知域名，仅展示页面');
  })();
</script>
</body>
</html>
