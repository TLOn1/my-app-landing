<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download the App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f7;
      text-align: center;
    }
    .container {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 0.5rem;
      color: #1d1d1f;
    }
    p {
      color: #6e6e73;
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    .appstore-button {
      display: inline-block;
      background-color: #0071e3;
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 1.1rem;
      transition: background-color 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,113,227,0.2);
    }
    .appstore-button:hover {
      background-color: #0077ed;
    }
    .appstore-button:active {
      background-color: #0063c4;
    }
    .note {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #86868b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 Download the App</h1>
    <p>It looks like you don't have the app installed.<br>Get it from the App Store to continue.</p>
    <a class="appstore-button" href="https://apps.apple.com/hk/app/id-one/id6755210949" target="_blank" rel="noopener noreferrer">
      ⬇️ Download on the App Store
    </a>
    <div class="note">ID-ONE App · Hong Kong</div>
  </div>

  <script>
  (function() {
    // 商店链接
    var APP_STORE_LINK = 'https://apps.apple.com/hk/app/id-one/id6755210949';
    var PLAY_STORE_LINK = 'https://play.google.com/store/apps/details?id=com.tradelink.idone';
    
    // 自定义域名
    var CUSTOM_DOMAIN = 'webekyc-uat.tradelinksig.com';
    
    var ua = navigator.userAgent || '';
    var host = window.location.hostname;
    var isLocal = host === 'localhost' || host === '127.0.0.1';
    var isVercel = host.endsWith('.vercel.app');
    var isCustom = host === CUSTOM_DOMAIN;
    
    // 设备检测
    var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /Android/.test(ua);
    
    // 如果是本地或 Vercel 预览，只显示页面，不做自动操作
    if (isLocal || isVercel) {
      console.log('🧪 测试环境，跳过自动唤起');
      return;
    }
    
    // 只在自定义域名上执行
    if (!isCustom) {
      return;
    }
    
    // 获取当前完整 URL（Universal Link / App Link）
    var deepLink = window.location.href;
    
    if (isIOS) {
      // ---------- iOS Universal Link ----------
      var timer = setTimeout(function() {
        window.location.href = APP_STORE_LINK;
      }, 500);
      
      window.addEventListener('blur', function() {
        clearTimeout(timer);
      });
      
      // 尝试打开 App
      window.location.href = deepLink;
      
    } else if (isAndroid) {
      // ---------- Android App Links + Intent Fallback ----------
      
      // 方法1：尝试通过 App Links 打开（Chrome 等支持）
      window.location.href = deepLink;
      
      // 方法2：如果 App 未安装，使用 Intent URL 尝试打开，并附加回退到 Play Store
      var fallbackTimer = setTimeout(function() {
        // Intent URL 结构：
        // intent://.../...#Intent;scheme=https;package=包名;S.browser_fallback_url=商店链接;end;
        var intentUrl = deepLink.replace(/^https:\/\//, 'intent://');
        intentUrl = intentUrl + '#Intent;scheme=https;package=com.tradelink.idone;S.browser_fallback_url=' + encodeURIComponent(PLAY_STORE_LINK) + ';end;';
        
        window.location.href = intentUrl;
      }, 300);
      
      // 如果 App 成功打开，页面会失去焦点或隐藏，取消计时器
      window.addEventListener('blur', function() {
        clearTimeout(fallbackTimer);
      });
      window.addEventListener('pagehide', function() {
        clearTimeout(fallbackTimer);
      });
      
    } else {
      // 其他设备（桌面等）不自动操作，仅显示页面
      console.log('非移动设备，显示页面');
    }
  })();
</script>
</body>
</html>
